[build]
builder = "DOCKERFILE"
dockerfilePath = "/05-example-web-application/client-react/Dockerfile.railway"

[deploy]
restartPolicyMaxRetries = 10
restartPolicyType = "ON_FAILURE"

# Also set env vars:
# RAILWAY_DOCKERFILE_PATH=/05-example-web-application/client-react/Dockerfile.railway
# PORT=80
